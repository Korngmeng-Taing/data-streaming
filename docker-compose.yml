services:
  crypto-producer:
    build: .
    container_name: crypto-producer
    networks: [crypto-net]
    environment:
      CRYPTO_API_BASE_URL: https://api.coingecko.com/api/v3
      CRYPTO_IDS: bitcoin,ethereum,solana,cardano,polkadot
      VS_CURRENCY: usd
      USE_MOCK_DATA: "false"
      OUTPUT_PATH: /data/dwh
    volumes:
      - crypto-dwh:/data/dwh
    healthcheck:
      test: pgrep -f "api.crypto_producer" || exit 1
      interval: 15s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command: python -m api.crypto_producer

  pipeline:
    build: .
    container_name: crypto-pipeline
    networks: [crypto-net]
    depends_on:
      - crypto-producer
    environment:
      OUTPUT_PATH: /data/dwh
    volumes:
      - crypto-dwh:/data/dwh
    healthcheck:
      test: pgrep -f "pipeline.runner" || exit 1
      interval: 15s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command: python -m pipeline.runner

  dashboard:
    build: .
    container_name: crypto-dashboard
    networks: [crypto-net]
    ports:
      - "8501:8501"
    depends_on:
      - pipeline
    environment:
      OUTPUT_PATH: /data/dwh
      PORT: 8501
    volumes:
      - crypto-dwh:/data/dwh
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8501')" || exit 1
      interval: 15s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    command: python -m dash_app.app

networks:
  crypto-net:
    driver: bridge

volumes:
  crypto-dwh:
